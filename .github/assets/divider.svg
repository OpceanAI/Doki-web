<svg xmlns="http://www.w3.org/2000/svg" width="600" height="80" viewBox="0 0 600 80">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0070f3;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0070f3;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0070f3;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="40" x2="600" y2="40" stroke="url(#lineGrad)" stroke-width="1"/>
  <circle cx="300" cy="40" r="4" fill="#0070f3">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="40" r="2" fill="#00d4ff" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="40" r="2" fill="#00d4ff" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>
