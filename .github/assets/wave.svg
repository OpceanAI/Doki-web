      <stop offset="25%" style="stop-color:#0070f3;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="75%" style="stop-color:#0070f3;stop-opacity:0.3"/>
