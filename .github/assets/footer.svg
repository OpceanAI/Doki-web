<svg xmlns="http://www.w3.org/2000/svg" width="400" height="60" viewBox="0 0 400 60">
  <defs>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0070f3;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0070f3;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0070f3;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <line x1="0" y1="30" x2="400" y2="30" stroke="url(#footerGrad)" stroke-width="1"/>
  <circle cx="200" cy="30" r="3" fill="#0070f3">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#666" letter-spacing="2">THE WEBSITE FOR THE CONTAINER ENGINE FOR THE OTHER 3 BILLION DEVICES</text>
</svg>
